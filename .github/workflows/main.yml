name: Deploy to Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Astro bauen
        run: npm run build

      - name: Bilder in dist kopieren
        run: |
          mkdir -p dist/assets
          cp -r assets/img dist/assets/img

      - name: SSH vorbereiten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Zielordner vorbereiten
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p ~/portfolio"

      - name: Dateien nach IONOS deployen
        run: |
          rsync -avz --delete \
            --chmod=D755,F644 \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            ./dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/portfolio/"
